name: MSBuild

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  SOLUTION_FILE_PATH: .
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: install ewdk
      shell: powershell
      run: |
        $ewdkUrl = "https://go.microsoft.com/fwlink/?linkid=2262235"
        $installer = "ewdk.iso"
        $wc = New-Object System.Net.WebClient
        $wc.DownloadFile($ewdkUrl, $installer)
        7z x $installer -o"C:\ewdk" -y
        # locate the include and lib directories dynamically to avoid hardcoding version mismatches
        $includePath = Get-ChildItem -Path "C:\ewdk" -Filter "km" -Recurse | Where-Object { $_.FullName -like "*Include*" } | Select-Object -ExpandProperty FullName -First 1
        $libPath = Get-ChildItem -Path "C:\ewdk" -Filter "km" -Recurse | Where-Object { $_.FullName -like "*Lib*" } | Select-Object -ExpandProperty FullName -First 1
        echo "INCLUDE=$includePath" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "LIB=$libPath" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}
